{% extends 'base.html' %}

{% block title %}Detalle de IA{% endblock %}

{% block content %}
<div class="container my-4">
  <h2>Detalle de IA</h2>
  <div class="card">
    <div class="card-body">
      <h5 class="card-title">{{ ia.name }}</h5>
      <p class="card-text">{{ ia.description }}</p>
      <p class="text-muted">Creado: {{ ia.created_at }}</p>
    </div>
  </div>
  <br>
  <a href="{% url 'catalog:ia_list' %}" class="btn btn-secondary">Volver al listado</a>
</div>
{% endblock %}
